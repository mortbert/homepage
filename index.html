<style>
  :root {
    --air: #e4edef;
    --water: #c6d8dc;
    --water-deep: #b3c9cf;
    --ink: #1c4753;
    --fjord: #3d5f68;
    --fjord-soft: #7b959c;
    --salmon: #f2846b;
    --hairline: rgba(16, 43, 50, 0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: "Familjen Grotesk", system-ui, sans-serif;
    background: var(--air);
    color: var(--ink);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  .mono {
    font-family: "Spline Sans Mono", ui-monospace, monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* ---------- Top bar ---------- */
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 1.4rem clamp(1.25rem, 5vw, 4rem);
    color: var(--fjord);
  }

  /* ---------- Air (above the waterline) ---------- */
  .air {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: clamp(2rem, 6vh, 4rem) clamp(1.25rem, 5vw, 4rem) 0;
  }

  .eyebrow {
    color: var(--fjord);
    margin-bottom: 1.1rem;
  }

  .eyebrow::before {
    content: "";
    display: inline-block;
    width: 2.2rem;
    height: 1px;
    background: var(--salmon);
    vertical-align: middle;
    margin-right: 0.75rem;
  }

  .intro {
    max-width: 34em;
    font-size: clamp(1rem, 1.4vw, 1.15rem);
    line-height: 1.55;
    color: var(--fjord);
    margin-bottom: 1.6rem;
  }

  .intro a {
    color: var(--ink);
    font-weight: 600;
    text-decoration: none;
    border-bottom: 2px solid var(--salmon);
    padding-bottom: 1px;
    transition: color 0.15s ease, border-color 0.15s ease;
  }

  .intro a:hover {
    color: var(--salmon);
  }

  .intro a:focus-visible {
    outline: 2px solid var(--salmon);
    outline-offset: 3px;
    border-radius: 2px;
  }

  .name {
    font-size: clamp(2.6rem, 11.5vw, 7.5rem);
    font-weight: 650;
    letter-spacing: -0.025em;
    line-height: 0.98;
    padding-bottom: clamp(0.6rem, 1.5vh, 1.2rem);
  }

  /* ---------- Waterline ---------- */
  .waterline {
    height: 1px;
    background: var(--hairline);
    width: 100%;
  }

  /* ---------- Water (below the waterline) ---------- */
  .water {
    background: linear-gradient(var(--water), var(--water-deep));
    padding: 0 clamp(1.25rem, 5vw, 4rem) clamp(1.2rem, 4vh, 2.5rem);
    overflow: hidden;
  }

  .reflection-mask {
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent 95%);
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent 95%);
  }

  .reflection {
    font-size: clamp(2.6rem, 11.5vw, 7.5rem);
    font-weight: 650;
    letter-spacing: -0.025em;
    line-height: 1.5;
    margin-top: -0.25em;
    transform: scaleY(-1);
    color: var(--fjord);
    opacity: 0.45;
    filter: blur(1px);
    user-select: none;
    pointer-events: none;
    animation: sway 7s ease-in-out infinite alternate;
  }

  @keyframes sway {
    from { transform: scaleY(-1) skewX(0.4deg); }
    to   { transform: scaleY(-1) skewX(-0.6deg) translateX(4px); }
  }

  @media (prefers-reduced-motion: reduce) {
    .reflection { animation: none; }
  }

  footer {
    background: var(--water-deep);
    color: var(--fjord-soft);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
    padding: 1.4rem clamp(1.25rem, 5vw, 4rem) 1.6rem;
  }
</style>
</head>
<body>

<header>
  <span class="mono">mortenbertelsen.com</span>
  <span class="mono">Norway</span>
</header>

<main class="air">
  <p class="eyebrow mono">Communications executive</p>
  <p class="intro">
    I lead communications for a living. I keep this domain mainly for vanity
    reasons, so there is not much to see here. The useful part is
    <a href="https://www.linkedin.com/in/mortbert" rel="me">my LinkedIn profile&nbsp;&#8599;</a>.
  </p>
  <h1 class="name">Morten Bertelsen</h1>
</main>

<div class="waterline" role="presentation"></div>

<div class="water">
  <div class="reflection-mask">
    <div class="reflection" aria-hidden="true">Morten Bertelsen</div>
  </div>
</div>

<footer>
  <span class="mono">&copy; 2026 Morten Bertelsen</span>
</footer>

</body>
</html>
